name: "windmaker-home-ip-monitor"
arch: "aarch64"
platform: "linux"
version: "v0.0.5"
section: "default"
priority: "extra"
provides:
  - windmaker-home-ip-monitor
maintainer: "Álvaro Castellano Vela <alvaro@windmaker.net>"
description: |
  This program checks if my Home IP changes, notify if IP and ISP changes.
vendor: "Windmaker"
homepage: "https://git.windmaker.net/a-castellano/home-ip-monitor"
license: "GPLV3"
changelog: "changelog.yaml"
contents:
  - src: ../../home-ip-monitor
    dst: /usr/local/bin/windmaker-home-ip-monitor
  - src: ../deb/default/windmaker-home-ip-monitor
    dst: /etc/default/windmaker-home-ip-monitor-example
  - src: ../deb/systemd/windmaker-home-ip-monitor.service
    dst: /usr/lib/systemd/system/windmaker-home-ip-monitor.service
  - src: ../deb/systemd/windmaker-home-ip-monitor.timer
    dst: /usr/lib/systemd/system/windmaker-home-ip-monitor.timer
overrides:
  deb:
    scripts:
      postinstall: ../deb/scripts/postinstall.sh
